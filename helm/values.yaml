# Lenovo Battery Tool - Helm Chart Values

# Global settings
global:
  imageRegistry: "docker.io"
  imageTag: "2.0.0"
  imagePullSecrets: []

replicaCount: 2

image:
  repository: lenovo-battery-tool
  tag: "2.0.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: battery.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

service:
  type: ClusterIP
  port: 80

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

metrics:
  serviceMonitor: false
  namespace: monitoring

prometheus:
  enabled: true
  serviceMonitorEnabled: false

extraEnvVars: []
extraVolumes: []
extraContainers: []
