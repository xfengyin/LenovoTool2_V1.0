apiVersion: apps/v1
kind: Deployment
metadata:
  name: lenovo-battery-tool
  namespace: lenovo-battery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lenovo-battery-tool
  template:
    metadata:
      labels:
        app: lenovo-battery-tool
    spec:
      containers:
        - name: app
          image: lenovo-battery-tool:2.0.0
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: lenovo-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lenovo-battery-http
  namespace: lenovo-battery
spec:
  type: ClusterIP
  selector:
    app: lenovo-battery-tool
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 4317
      targetPort: 9090
